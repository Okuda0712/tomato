<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>農園管理システム - 起票一覧</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="side-panel-page">
    <div class="screen">
        
        <nav class="side-panel">

            <div class="system-title">
                <a href="{{ url_for('ui_bp.home_index') }}" style="text-decoration: none; color: inherit;">
                    <p>
                        <span class="text-wrapper">農園管理<br />システム</span>
                        <span class="span">Ver 0.0</span>
                    </p>
                </a>
            </div>
                      
            <ul class="nav-menu">
                <li class="button-create" onclick="location.href='{{ url_for('ui_bp.kihyo_index') }}'">
                    <i class="icon fas fa-pen-nib"></i>
                    <div class="text-wrapper-button">起票作成</div>
                </li>
                <li class="button-list active" onclick="location.href='{{ url_for('ui_bp.kannri_index') }}'">
                    <i class="icon fas fa-book"></i>
                    <div class="text-wrapper-button">起票一覧</div>
                </li>
                <li class="button-dashboard" onclick="location.href='{{ url_for('ui_bp.dashboard_index') }}'">
                    <i class="icon fas fa-chart-bar"></i>
                    <div class="text-wrapper-buttond">ダッシュボード</div>
                </li>
                <li class="button-alert" onclick="location.href='{{ url_for('ui_bp.keiti_index') }}'">
                    <i class="icon fa fa-bell"></i>
                    <div class="text-wrapper-button">異常検知</div>
                </li>
                    <li class="button-camera" onclick="location.href='{{ url_for('ui_bp.camera_page') }}'">
                    <i class="icon fas fa-video"></i>
                    <div class="text-wrapper-button">デモ用カメラ</div>
                </li>
            </ul>

            <form id="logout-form" method="POST" action="{{ url_for('auth_bp.logout') }}" style="width: 100%; margin-top: auto; padding-bottom: 20px;">
                <button type="submit" class="button-logout" style="width: 100%; height: 50px; background-color: #f1f1f1; border: 1px solid #ccc; border-radius: 10px; font-size: 24px; font-weight: 700; cursor: pointer; transition: background-color 0.2s;">
                    <i class="icon fas fa-sign-out-alt"></i> ログアウト
                </button>
            </form>

        </nav>

        <div class="line-wrapper"><div class="line"></div></div>

        <main class="main-content">
    <h1 class="page-title">起票一覧</h1>

    <div class="filter-area">
        <div class="filter-row category-row">
            <label class="filter-label">起票カテゴリ</label>
            <div class="filter-input dropdown-field">
                <select id="category-filter" class="dropdown-select">
                    <option value="all">全て</option>
                    <option value="害虫 (大分類)">害虫 (大分類)</option>
                    <option value="病気 (大分類)">病気 (大分類)</option>
                    <option value="その他 (大分類)">その他 (大分類)</option>
                    <option value="タバココナジラミ">-- タバココナジラミ</option>
                    <option value="オオタバコガ">-- オオタバコガ</option>
                    <option value="アザミウマ">-- アザミウマ</option>
                    <option value="トマトキバガ">-- トマトキバガ</option>
                    <option value="トマト黄化葉巻病">-- トマト黄化葉巻病</option>
                    <option value="トマト黄硫黄エソ病">-- トマト黄硫黄エソ病</option>
                </select>
                <span class="dropdown-arrow">▼</span>
            </div>
        </div>

        <div class="filter-row date-row">
            <label class="filter-label">日付</label>
            <div class="date-fields">
                <input type="text" id="date-filter-y" class="input-year" value="" placeholder="年" maxlength="4"/> <span>年</span>
                <input type="text" id="date-filter-m" class="input-month" value="" placeholder="月" maxlength="2"/> <span>月</span>
                <input type="text" id="date-filter-d" class="input-day" value="" placeholder="日" maxlength="2"/> <span>日</span>
            </div>
        </div>
    </div>
    <div class="ticket-list-container">
        <table class="ticket-table" id="ticket-table">
            <thead>
                <tr>
                    <th class="col-select">選択</th>
                    <th class="col-id">ID</th>
                    <th class="col-category">カテゴリー</th> 
                    <th class="col-subject">件名</th>
                    <th class="col-date">発生日時</th> 
                    <th class="col-creator">作成者</th> 
                    <th class="col-location">場所</th>
                    <th class="col-status">ステータス</th>
                </tr>
            </thead>
            <tbody id="ticket-list-body">
                </tbody>
        </table>
    </div>
    <div class="footer-buttons">
        <button type="button" class="button-back" onclick="location.href='{{ url_for('ui_bp.home_index') }}'">
            <span class="button-back-text">戻る</span>
        </button>
        
        <button type="button" class="button-common button-excel-selection" onclick="exportSelectedTickets()">
            <span class="button-text">Excel出力</span>
        </button>
    </div>
    </main>


    </div>


    <script>
    // ★修正: Jinja2タグをHTMLレンダリング時に処理させ、JS変数に格納する★
    const EXPORT_EXCEL_BASE_URL = "{{ url_for('api.excel_download') }}";
    </script>
    <script src="{{ url_for('static', filename='script4.js') }}"></script>
</body>
</html>
