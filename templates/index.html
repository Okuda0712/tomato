<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <title>農園管理システム ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-page-layout">
    <div class="screen">
        <div class="header-view">
            <div class="text-wrapper">農園管理システム</div>
        </div>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative w-[785px] max-w-full mb-4" role="alert">
            <strong class="font-bold">エラー:</strong>
            <span class="block sm:inline">{{ error }}</span>
        </div>
        {% endif %}

        <!-- アカウント登録処理を行う '/sakusei' ルートにデータをPOSTします -->
        <form class="input-form" method="POST" action="{{ url_for('auth_bp.index') }}"> 
            
            <div class="input-group">
                <div class="label-box">ログインID：</div>
                <input type="text" name="login_id" required 
                    class="input-box" placeholder="ログインIDを入力してください">
            </div>

            <div class="input-group">
                <div class="label-box">パスワード：</div>
                <input type="password" name="password" required 
                    class="input-box" placeholder="パスワードを入力してください">
            </div>

            <div class="action-button">
                
                <a href="{{ url_for('auth_bp.sakusei_index') }}" class="button-box button-back-sakusei">
                    アカウント作成
                </a>

                <div class="login-buttons-wrapper">
                    <button type="submit" class="button-box button-submit-sakusei">
                        ログイン
                    </button>               
                </div>

            </div> 

        </form>          
    </div>
</body>
</html>
